    // 啟動測驗
    function startQuiz() {
        const nameInput = document.getElementById("client-name").value.trim();
        const emailInput = document.getElementById("client-email").value.trim();

        if (!nameInput || !emailInput) {
            alert("請填寫您的稱呼與信箱，開啟五感隨行。");
            return;
        }

        clientData.name = nameInput;
        clientData.email = emailInput;

        document.getElementById("step-0").classList.remove("active");
        renderQuestion(currentQuestionIdx);
    }

    // 動態渲染題目
    function renderQuestion(idx) {
        const qBox = document.getElementById("dynamic-quiz-box");
        qBox.innerHTML = ""; // 清空
        qBox.className = "quiz-step active";

        const qData = questions[idx];

        // 建立時間與標題 HTML
        let html = `
            <div class="time-badge">${qData.time}</div>
            <div class="step-info">${qData.info}</div>
            <h2 class="question-title">Q${idx + 1}. ${qData.q}</h2>
            <p class="subtitle">${qData.sub}</p>
        `;

        if (qData.type === "single" || qData.type === "multiple") {
            html += `<div class="options-list">`;
            qData.options.forEach((opt, oIdx) => {
                html += `
                    <div class="option-card" onclick="handleOptionClick(this, ${idx}, ${oIdx}, '${qData.type}')">
                        <span class="option-text">${opt.text}</span>
                    </div>
                `;
            });
            html += `</div>`;
            html += `
                <div class="btn-container">
                    <button class="btn-action" onclick="nextQuestion(${idx})">Next Step</button>
                </div>
            `;
        } else if (qData.type === "sort") {
            // 渲染滑動排序題
            html += `<div class="sortable-list" id="drag-list">`;
            qData.options.forEach((opt, oIdx) => {
                html += `
                    <div class="sort-item" draggable="true" data-val="${opt.val}">
                        <span class="sort-index">0${oIdx + 1}</span>
                        <span class="sort-text">${opt.text}</span>
                        <span class="sort-handle">☰</span>
                    </div>
                `;
            });
            html += `</div>`;
            html += `
                <div class="btn-container">
                    <button class="btn-action" onclick="handleSortConfirm(${idx})">Next Step</button>
                </div>
            `;
        }

        qBox.innerHTML = html;

        // 若為排序題，動態綁定 Drag & Drop 監聽事件
        if (qData.type === "sort") {
            initDragAndDrop();
        }
    }

    // 處理選項點擊 (單選與複選視覺切換)
    function handleOptionClick(card, qIdx, oIdx, type) {
        if (type === "single") {
            const siblings = card.parentNode.querySelectorAll(".option-card");
            siblings.forEach(s => s.classList.remove("selected"));
            card.classList.add("selected");
        } else {
            card.classList.toggle("selected");
        }
    }

    // 初始化排序題的拖曳功能
    function initDragAndDrop() {
        const list = document.getElementById("drag-list");
        list.addEventListener("dragstart", (e) => {
            if(e.target.classList.contains("sort-item")) e.target.classList.add("dragging");
        });
        list.addEventListener("dragend", (e) => {
            if(e.target.classList.contains("sort-item")) {
                e.target.classList.remove("dragging");
                const items = list.querySelectorAll(".sort-item");
                items.forEach((item, index) => {
                    item.querySelector(".sort-index").innerText = String(index + 1).padStart(2, '0');
                });
            }
        });
        list.addEventListener("dragover", (e) => {
            e.preventDefault();
            const draggingItem = document.querySelector(".dragging");
            const siblings = [...list.querySelectorAll(".sort-item:not(.dragging)")];
            let nextSibling = siblings.find(sibling => {
                return e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2;
            });
            list.insertBefore(draggingItem, nextSibling);
        });
    }

        // 核心加權計分邏輯：若將「設計師單椅」或「燈飾地毯」排在第一順位，代表藝術品味高
        const firstPlace = items[0].getAttribute("data-val");
        if (firstPlace === "設計師單椅" || firstPlace === "燈飾地毯") {
            clientData.scoreX += 3;
        } else {
            clientData.scoreX += 1;
        }

        clientData.answers["家具重視度排序"] = sortOrder.join(" > ");
        
        // 進入下一題
        currentQuestionIdx++;
        renderQuestion(currentQuestionIdx);
    }

    // 下一題通用邏輯 (單選與複選)
    function nextQuestion(idx) {
        const qBox = document.getElementById("dynamic-quiz-box");
        const selectedCards = qBox.querySelectorAll(".option-card.selected");

        if (selectedCards.length === 0) {
            alert("請感知您的內心，並至少選擇一個選項。");
            return;
        }

        const qData = questions[idx];
        let chosenTexts = [];
        let chosenTags = [];

        // 加總計分與標籤收集
        selectedCards.forEach(card => {
            const text = card.querySelector(".option-text").innerText;
            chosenTexts.push(text);

            // 尋找對應的原始配置數據
            const matchedOpt = qData.options.find(o => o.text === text);
            if (matchedOpt) {
                clientData.scoreX += matchedOpt.x;
                clientData.scoreY += matchedOpt.y;
                chosenTags.push(matchedOpt.tag);
            }
        });

        // 把當前答案寫入 answers 物件
        clientData.answers[`Q${idx + 1}_(${qData.time})_${qData.q}`] = {
            answers: chosenTexts.join(" | "),
            tags: chosenTags.join(", ")
        };

        // 判斷是否還有下一題
        if (currentQuestionIdx < questions.length - 1) {
            currentQuestionIdx++;
            renderQuestion(currentQuestionIdx);
        } else {
            // 24題結束，執行計分判定與發送資料
            calculateAndSubmit();
        }
    }

    // 總分落點判定與自動發送
    function calculateAndSubmit() {
        document.getElementById("dynamic-quiz-box").classList.remove("active");
        const resultStep = document.getElementById("step-result");
        resultStep.classList.add("active");

        let finalTypeKey = "A1"; // 預設安全落點
        const sx = clientData.scoreX;
        const sy = clientData.scoreY;

        // X軸判定 (造型與預算總和分水嶺)
        // Y軸判定 (色彩大膽度：0-5為內斂，6以上為大膽)
        if (sx <= 12) {
            finalTypeKey = (sy <= 12) ? "A1" : "A2";
        } else if (sx > 12 && sx <= 22) {
            finalTypeKey = (sy <= 12) ? "A3" : "A4";
        } else {
            finalTypeKey = (sy <= 12) ? "A5" : "A6";
        }

        const finalResult = vibeResults[finalTypeKey];
        clientData.resultType = finalResult.title;

        // 渲染到前端畫面上
        document.getElementById("display-vibe-title").innerText = finalResult.title;
        document.getElementById("display-vibe-matrix").innerText = finalResult.matrix;
        document.getElementById("display-vibe-desc").innerText = finalResult.desc;

        // 🚀 利用 Fetch 將整包豐富的諮詢數據無縫打包，隔空傳送至 Make.com / Notion
        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(clientData)
        })
        .then(res => console.log("觀域後台數據同步成功。"))
        .catch(err => console.error("數據同步卡關：", err));
    }
</script>
