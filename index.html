<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尋找你的生活調性 — 觀域 OBSERVATORY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E2DFD8;       /* 溫潤的大地奶茶色背景 */
            --card-bg: #F5F4F0;        /* 輕盈的米白卡片色 */
            --text-main: #1A1A1A;      /* 極致沉穩的深灰黑 */
            --text-muted: #7A756E;    /* 優雅的低彩度灰褐 */
            --accent: #A39E93;        /* 微醺的泥灰輔助色 */
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "GenYoMin TW", "GenYoMin", "Noto Serif TC", serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        input, button {
            font-family: inherit;
        }

        /* 🟢 品牌 Header：橫向中心點對齊，散開至兩側，每一頁都固定出現 */
        .brand-header {
            position: fixed;
            top: 24px;
            left: 24px;
            right: 24px;
            display: flex;
            flex-direction: row;
            justify-content: space-between; /* 左 Logo，右文字 */
            align-items: center;            /* 橫向中心點對齊 */
            z-index: 1000;
            pointer-events: none; /* 避免擋到下方的點擊事件 */
        }

        .brand-header * {
            pointer-events: auto;
        }

        /* 控制 Logo 圖片大小 */
        .brand-header .logo-wrapper img {
            height: 40px;       
            width: auto;
            display: block;
        }

        /* 靠畫面右邊的副標題文字 */
        .brand-header .brand-subtext {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* 主內容區：預留頂部與底部空間避免與 header/footer 重疊 */
        .quiz-container {
            width: 100%; 
            max-width: 900px; 
            min-height: 500px;
            background-color: var(--card-bg);
            padding: 60px 80px; 
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            position: relative; 
            transition: var(--transition);
            margin: 80px 0 40px 0;
        }

        .quiz-step {
            display: none;
            width: 100%;
        }

        .quiz-step.active {
            display: block;
            animation: fadeIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 編號與標題 */
        .time-badge {
            font-size: 32px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .step-info {
            font-size: 11px;
            text-align: center;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        h1.main-title {
            font-size: 42px; 
            font-weight: 400;
            letter-spacing: 4px; 
            text-align: center; 
            margin-bottom: 15px; 
            color: var(--text-main);
        }

        .question-title {
            font-size: 24px; 
            font-weight: 400; 
            line-height: 1.6;
            text-align: center; 
            margin-bottom: 35px; 
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px; 
            color: var(--text-muted); 
            text-align: center;
            margin-bottom: 40px; 
            letter-spacing: 2px; 
            line-height: 1.8;
        }

        /* 輸入框設計 */
        .input-group { max-width: 400px; margin: 0 auto 30px; width: 100%; }
        input[type="text"] {
            width: 100%; padding: 15px 5px; background: transparent;
            border: none; border-bottom: 1px solid var(--accent);
            font-size: 15px; color: var(--text-main); outline: none;
            transition: var(--transition); text-align: center; letter-spacing: 1px;
        }
        input::placeholder { color: var(--accent); font-weight: 300; }
        input:focus { border-bottom-color: var(--text-main); }

        /* 選項外層 */
        .options-list {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px;
            width: 100%; 
            max-width: 750px; 
            margin: 0 auto 40px;
        }

        .option-card {
            background: transparent; 
            border: 1px solid #E2DFD8; 
            padding: 25px;
            font-size: 15px; 
            font-weight: 300; 
            color: var(--text-main);
            cursor: pointer; 
            text-align: left; 
            line-height: 1.6; 
            letter-spacing: 0.5px;
            transition: var(--transition); 
            border-radius: 2px;
        }

        .option-card:hover {
            background-color: var(--bg-color); 
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        /* 選項選中狀態的優雅點擊回饋 */
        .option-card.selected {
            background-color: #DDD9CE;
            border-color: var(--text-main);
        }

        /* 🧭 導覽按鈕容器：完美分開左右兩邊 */
        .nav-btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 750px;
            margin: 20px auto 0;
            width: 100%;
        }

        /* 進入下一題按鈕（右側） */
        .btn-action {
            width: 160px; 
            padding: 15px;
            background-color: var(--text-main); 
            color: white; 
            border: none;
            font-size: 13px; 
            letter-spacing: 2px;
            cursor: pointer; 
            transition: var(--transition); 
            text-transform: uppercase;
            margin-left: auto; /* 預設推向右邊 */
        }
        .btn-action:hover { background-color: var(--text-muted); letter-spacing: 4px; }

        /* 回到上一題按鈕（左側） */
        .btn-prev {
            width: 160px;
            padding: 15px;
            background-color: #E2DFD8; /* 指定底色 */
            color: var(--text-muted);
            border: none;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
        }
        /* 點擊與回饋效果 */
        .btn-prev:hover {
            color: var(--text-main);
        }
        .btn-prev:active {
            background-color: #A39E93; /* 指定回饋色 */
            color: white;
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* 結果頁面樣式 */
        .result-layout { text-align: center; max-width: 600px; margin: 0 auto; }
        .result-title { font-size: 24px; letter-spacing: 2px; margin-bottom: 12px; font-weight: 400; }
        .result-matrix { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 32px; }
        .result-description { font-size: 15px; font-weight: 300; color: #333333; line-height: 1.8; text-align: justify; margin-bottom: 40px; }
        .epilogue-box { border-top: 1px solid #E2DFD8; padding-top: 40px; margin-top: 40px; }
        .epilogue-text { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; font-weight: 300; }
        .epilogue-highlight { font-size: 20px; letter-spacing: 3px; color: var(--text-main); margin-bottom: 32px; font-weight: 400; }

        /* 底部註腳：修正為固定於頁面最下方正中心 */
        footer {
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
            padding: 20px 0;
            margin-top: auto; /* 確保推到最底 */
        }

        /* 📱 響應式網頁設計修正 (RWD) */
        @media (max-width: 768px) {
            .brand-header {
                top: 16px; left: 16px; right: 16px;
            }
            .brand-header .logo-wrapper img { height: 30px; }
            .brand-header .brand-subtext { font-size: 9px; }
            .quiz-container { padding: 40px 20px; margin-top: 70px; }
            .options-list { grid-template-columns: 1fr; gap: 12px; }
            h1.main-title { font-size: 30px; }
            .question-title { font-size: 18px; margin-bottom: 20px; }
            .nav-btn-container { flex-direction: column-reverse; gap: 12px; }
            .btn-action, .btn-prev { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <span class="logo-wrapper"><img src="螢幕擷取畫面 2025-11-06 152214.png" alt="Guanyu Design Logo"></span>
        <span class="brand-subtext">Bespoke Custom Design</span>
    </div>

    <div class="quiz-container fade-in" id="quiz-card">
        
        <div id="step-0" class="quiz-step active">
            <h1 class="main-title">尋找你的生活調性</h1>
            <p class="subtitle">循著日常，探索屬於你的空間敘事</p>
            
            <div class="input-group">
                <input type="text" id="client-name" placeholder="如何稱呼您 INDIVIDUAL NAME" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="text" id="client-email" placeholder="案件名稱 PROJECT NAME" autocomplete="off">
            </div>
            <div class="nav-btn-container">
                <button class="btn-action" onclick="startQuiz()">Start</button>
            </div>
        </div>

        <div id="dynamic-quiz-box" class="quiz-step"></div>

        <div id="step-result" class="quiz-step">
            <div class="result-layout">
                <div class="step-info">Your Vibe Archetype</div>
                <h2 class="result-title" id="display-vibe-title">讀取中...</h2>
                <div class="result-matrix" id="display-vibe-matrix">讀取中...</div>
                <p class="result-description" id="display-vibe-desc">系統正在為您定調軟裝美學...</p>
                
                <div class="epilogue-box">
                    <p class="epilogue-text">EPILOGUE ／ 觀域</p>
                    <p class="epilogue-highlight">我們整理的，不只是空間。更是未來長期生活的方式。</p>
                    <button class="btn-action" style="background-color: transparent; border: 1px solid var(--text-main); color: var(--text-main); margin: 0 auto;" onclick="location.reload();">Restart</button>
                </div>
            </div>
        </div>

    </div>

    <footer>GUANYU-DESIGN ／ INTERIOR DECORATING</footer>

<script>
    const webhookUrl = "https://hook.us1.make.com/xxxxxxxxxxxxxx"; 

    let clientData = {
        name: "",
        email: "",
        scoreX: 0,
        scoreY: 0,
        resultType: "",
        answers: {}
    };

    let currentQuestionIdx = 0;
    // 用於記錄每一步驟加了多少分，方便回到上一題時扣除
    let scoreHistory = [];

    const questions = [
        {
            time: "00:00", info: "Phase 1 - Light & Shadow", type: "single",
            q: "微醺的夜，最吸引你目光的光影是？", sub: "定調最深層的感性色彩基礎",
            options: [
                { text: "暖黃色的間接照明，均勻洗在乾淨米白色牆面上，非常療癒。", x: 1, y: 1, tag: "排斥高彩度跳色" },
                { text: "一盞線條大膽、帶有金屬未來感的雕塑立燈，在黑暗中投射強烈光影。", x: 3, y: 1, tag: "偏好獨特線條" },
                { text: "帶著神祕勃根地紅或復古綠的局部跳色牆，配上微微搖曳的燭光。", x: 2, y: 3, tag: "偏好大膽跳色" }
            ]
        },
        {
            time: "01:00", info: "Phase 1 - Reject Element", type: "multiple",
            q: "閉上眼，你絕對不想在新家的夢境裡看見哪種畫面？", sub: "過濾心中最排斥的材質與氛圍（可複選）",
            options: [
                { text: "冰冷僵硬、毫無個性，看起來像大量複製的平庸樣品屋。", x: 0, y: 0, tag: "排斥平庸樣品屋感" },
                { text: "笨重老舊、色調過於深沉沉悶的傳統木作感。", x: 0, y: 0, tag: "排斥深色老舊木作" },
                { text: "雜亂無章、各種刺眼色彩混雜在一起的凌亂感。", x: 0, y: 0, tag: "排斥複雜用色" },
                { text: "充滿銳利鐵件、稜角過多且難以親近的冰冷材質。", x: 0, y: 0, tag: "排斥圓形/複雜造型" }
            ]
        },
        {
            time: "02:00", info: "Phase 1 - Deep Dream", type: "single",
            q: "在你的理想夢境中，你正被哪一種空間的「風格調性」包裹著？", sub: "挖掘基礎核心美學風格偏好",
            options: [
                { text: "溫潤內斂、帶有自然微瑕肌理的寂靜侘寂感。", x: 2, y: 1, tag: "喜歡風格:侘寂自然" },
                { text: "線條俐落、黑白灰幾何分明的現代極簡感。", x: 1, y: 1, tag: "喜歡風格:現代極簡" },
                { text: "復古摩登、帶有法式優雅弧線與大膽色彩的中世紀摩登 (MCM)。", x: 3, y: 3, tag: "喜歡風格:摩登復古" },
                { text: "經典雋永、重視材質比例與對稱美學的當代經典。", x: 3, y: 2, tag: "喜歡風格:當代經典" }
            ]
        },
        {
            time: "03:00", info: "Phase 1 - Visual Layout", type: "single",
            q: "如果可以用「一組家具配置」來具象化你的靈魂，你直覺更趨近哪一種？", sub: "回推心中基礎配置美學結構",
            options: [
                { text: "規格化、簡單俐落、溫潤同色系的雋永經典配置。", x: 1, y: 1, tag: "偏好俐落規格品" },
                { text: "內斂同色，但充滿細緻訂製感與圓潤弧線的高級配置。", x: 2, y: 1, tag: "偏好細緻訂製款" },
                { text: "充滿藝術品味、大膽跳色且線條豐富的原創大師配置。", x: 3, y: 3, tag: "偏好大師原創藝術品" }
            ]
        },
        {
            time: "04:00", info: "Phase 1 - Inspiration", type: "single",
            q: "醒來前，如果能打包幾張「特別嚮往的家居參考照片」，你最愛它的主因會是？", sub: "抓取軟裝搭配的核心切入點",
            options: [
                { text: "「我喜歡那些家具擺放的慵懶呼吸感，看起來非常放鬆、留白。」", x: 1, y: 1, tag: "追求空間鬆弛感" },
                { text: "「我被照片裡某幾件極具設計感的單椅或特殊燈飾深深吸引。」", x: 3, y: 2, tag: "追求設計師單品焦點" },
                { text: "「我喜歡照片中材質的細緻堆疊，例如陶板與木皮撞擊出的細節。」", x: 2, y: 1, tag: "重視產品質感細節" }
            ]
        }
    ];

    const vibeResults = {
        "A1": { title: "簡單俐落 ╳ 內斂同色", matrix: "Muted Simplicity", desc: "您追求靈魂徹底留白的純粹感。在軟裝配置上，極度適合線條規整、簡單俐落的規格化或基礎訂製家具。色彩上建議採用高明度的淺米色、大白牆或溫潤奶茶色進行大面積同色系堆疊。" },
        "A2": { title: "簡單俐落 ╳ 撞色變化", matrix: "Vibrant Streamline", desc: "您在追求乾淨俐落的家具線條之餘，內心渴望色彩帶來的活力衝擊。適合選用結構規整、規矩好清潔的基礎家具為底。" }
    };

    // 🟢 啟動測驗修正
    function startQuiz() {
        const nameInput = document.getElementById("client-name").value.trim();
        const emailInput = document.getElementById("client-email").value.trim();

        if (!nameInput || !emailInput) {
            alert("請填寫您的稱呼與案件名稱，開啟五感隨行。");
            return;
        }

        clientData.name = nameInput;
        clientData.email = emailInput;

        document.getElementById("step-0").classList.remove("active");
        currentQuestionIdx = 0;
        scoreHistory = [];
        renderQuestion(currentQuestionIdx);
    }

    // 動態渲染題目與「左右雙導覽按鈕」
    function renderQuestion(idx) {
        const qBox = document.getElementById("dynamic-quiz-box");
        qBox.innerHTML = ""; 
        qBox.className = "quiz-step active";

        const qData = questions[idx];

        let html = `
            <div class="time-badge">${qData.time}</div>
            <div class="step-info">${qData.info}</div>
            <h2 class="question-title">Q${idx + 1}. ${qData.q}</h2>
            <p class="subtitle">${qData.sub}</p>
        `;

        if (qData.type === "single" || qData.type === "multiple") {
            html += `<div class="options-list">`;
            qData.options.forEach((opt, oIdx) => {
                html += `
                    <div class="option-card" onclick="handleOptionClick(this, ${idx}, ${oIdx}, '${qData.type}')">
                        <span class="option-text">${opt.text}</span>
                    </div>
                `;
            });
            html += `</div>`;
        }

        // 🟢 底部左右按鈕配置
        html += `<div class="nav-btn-container">`;
        if (idx > 0) {
            html += `<button class="btn-prev" onclick="prevQuestion(${idx})">Previous</button>`;
        } else {
            html += `<div></div>`; // 保持彈性佈局平衡
        }
        html += `<button class="btn-action" onclick="nextQuestion(${idx})">Next Step</button>`;
        html += `</div>`;

        qBox.innerHTML = html;
    }

    function handleOptionClick(card, qIdx, oIdx, type) {
        if (type === "single") {
            const siblings = card.parentNode.querySelectorAll(".option-card");
            siblings.forEach(s => s.classList.remove("selected"));
            card.classList.add("selected");
        } else {
            card.classList.toggle("selected");
        }
    }

    // 🟢 回到上一題邏輯
    function prevQuestion(idx) {
        if (scoreHistory.length > 0) {
            const lastScore = scoreHistory.pop();
            clientData.scoreX -= lastScore.x;
            clientData.scoreY -= lastScore.y;
        }
        currentQuestionIdx--;
        renderQuestion(currentQuestionIdx);
    }

    // 下一題通用邏輯
    function nextQuestion(idx) {
        const qBox = document.getElementById("dynamic-quiz-box");
        const selectedCards = qBox.querySelectorAll(".option-card.selected");

        if (selectedCards.length === 0) {
            alert("請感知您的內心，並至少選擇一個選項。");
            return;
        }

        const qData = questions[idx];
        let chosenTexts = [];
        let chosenTags = [];
        let currentStepScore = { x: 0, y: 0 };

        selectedCards.forEach(card => {
            const text = card.querySelector(".option-text").innerText;
            chosenTexts.push(text);

            const matchedOpt = qData.options.find(o => o.text === text);
            if (matchedOpt) {
                currentStepScore.x += matchedOpt.x;
                currentStepScore.y += matchedOpt.y;
                chosenTags.push(matchedOpt.tag);
            }
        });

        // 記錄分數歷史以便回退
        scoreHistory.push(currentStepScore);
        clientData.scoreX += currentStepScore.x;
        clientData.scoreY += currentStepScore.y;

        clientData.answers[`Q${idx + 1}_(${qData.time})`] = {
            answers: chosenTexts.join(" | "),
            tags: chosenTags.join(", ")
        };

        if (currentQuestionIdx < questions.length - 1) {
            currentQuestionIdx++;
            renderQuestion(currentQuestionIdx);
        } else {
            calculateAndSubmit();
        }
    }

    function calculateAndSubmit() {
        document.getElementById("dynamic-quiz-box").classList.remove("active");
        const resultStep = document.getElementById("step-result");
        resultStep.classList.add("active");

        let finalTypeKey = "A1"; 
        const sx = clientData.scoreX;
        const sy = clientData.scoreY;

        if (sx > 12) finalTypeKey = "A2"; 

        const result = vibeResults[finalTypeKey] || vibeResults["A1"];
        
        document.getElementById("display-vibe-title").innerText = result.title;
        document.getElementById("display-vibe-matrix").innerText = result.matrix;
        document.getElementById("display-vibe-desc").innerText = result.desc;
    }
</script>
</body>
</html>
